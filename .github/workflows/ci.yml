name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        # wrangler build runs the [build] hook (admin SPA) before bundling
        run: bunx wrangler build
