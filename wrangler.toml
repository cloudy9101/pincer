name = "pincer-gateway"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[durable_objects]
bindings = [
  { name = "CONVERSATION_DO", class_name = "ConversationSqlDO" },
]

[[migrations]]
tag = "v1"
new_classes = ["ConversationDO"]

[[migrations]]
tag = "v2"
deleted_classes = ["ConversationDO"]
new_sqlite_classes = ["ConversationSqlDO"]

[[d1_databases]]
binding = "DB"
database_name = "pincer-db"
database_id = "233ae0e9-7d6a-4e96-989d-d25118917470"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "128c3204efa24e3a90a05d063804ac7d"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "pincer-media"

[ai]
binding = "AI"

[[vectorize]]
binding = "MEMORY"
index_name = "pincer-memory"
